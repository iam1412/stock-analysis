# Cloudflare Workers — Worker + Static Assets + D1 (ตัวนับยอดวิว)
# เสิร์ฟไฟล์ใน ./dist เป็นเว็บ static (ไฟล์ .html เสิร์ฟตรงจาก edge ไม่ผ่าน Worker)
# Worker (src/worker.js) ทำงานเฉพาะเส้นทางที่ไม่มีไฟล์ static ตรงกัน เช่น /api/views/*
# deploy ด้วย `wrangler deploy`
# docs: https://developers.cloudflare.com/workers/static-assets/binding/

name = "stock-ai"
main = "src/worker.js"
compatibility_date = "2026-06-22"

[assets]
directory = "./dist"
binding = "ASSETS"
# run_worker_first ค่าเริ่มต้น = false → ถ้ามีไฟล์ static ตรง path จะเสิร์ฟก่อน (Worker ไม่ถูกเรียก)
# มีแต่ /api/* (ไม่มีไฟล์ตรง) ที่ตกมาถึง fetch handler ของ Worker
# html_handling ค่าเริ่มต้น = "auto-trailing-slash":
#   /            → index.html
#   /GOOGL       → GOOGL.html (เสิร์ฟตรง)
#   /GOOGL.html  → ก็เข้าได้ (redirect ไป /GOOGL)

# ★ Durable Object: ตัวนับเดียวทั้งระบบ (source of truth — นับเป๊ะ strongly-consistent ทั่วโลก)
#   instance เดียว env.COUNTERS.idFromName('global') เก็บทุกหุ้นในตาราง SQLite เดียว
[[durable_objects.bindings]]
name = "COUNTERS"
class_name = "Counters"

# ⚠️ ต้องเป็น new_sqlite_classes (ไม่ใช่ new_classes!) — KV backend แบบเก่าเป็น paid-only
#   มีแต่ SQLite-backed DO ที่สร้างได้บน Free plan · deploy ครั้งแรกจะสร้าง class ให้เอง
[[migrations]]
tag = "v1"
new_sqlite_classes = ["Counters"]

# D1 (ตาราง views เดิม): เหลือเป็นแค่ "mirror สำรอง" — เขียน best-effort, ไม่อ่านบน hot path
#   เริ่มนับใหม่จาก 0 (ไม่ migrate เลขเก่า) · เก็บ D1 เป็น backup เฉย ๆ แล้วค่อยลบบล็อกนี้ + โค้ด mirror ทีหลังก็ได้ (ดู DEPLOY.md)
[[d1_databases]]
binding = "DB"
database_name = "stockai_d1"
database_id = "e7cab704-7053-468d-94c9-41ed6b08f843"

# Rate limiting ในตัว Worker — กันสแปม /api/vote และ /api/views
# ทำงานบน workers.dev (ไม่ต้องมี custom domain/WAF) · period ได้แค่ 10 หรือ 60 วิ · ต้องใช้ Wrangler >= 4.36.0
[[ratelimits]]
name = "VOTE_LIMITER"
namespace_id = "1001"
[ratelimits.simple]
limit = 5            # โหวตได้ 5 ครั้ง
period = 60          # ต่อ 60 วิ ต่อ (IP + หุ้น)

[[ratelimits]]
name = "VIEW_LIMITER"
namespace_id = "1002"
[ratelimits.simple]
limit = 30           # นับวิว (POST) ได้ 30 ครั้ง
period = 60          # ต่อ 60 วิ ต่อ IP
