# Cloudflare Workers — Static Assets config
# เสิร์ฟไฟล์ใน ./dist เป็นเว็บ static (assets-only Worker — ไม่ต้องมี Worker script)
# docs: https://developers.cloudflare.com/workers/static-assets/

name = "stock-analysis"
compatibility_date = "2026-06-23"

[assets]
directory = "./dist"
# html_handling ค่าเริ่มต้น = "auto-trailing-slash":
#   /            → index.html
#   /GOOGL       → GOOGL.html
#   /GOOGL.html  → redirect ไป /GOOGL
# not_found_handling ค่าเริ่มต้น = "none" (404 ปกติ)
